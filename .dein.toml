[[plugins]] #search and display sources
repo = 'Shougo/unite.vim'

[[plugins]]
repo = 'glidenote/memolist.vim'

[[plugins]] # creating non existing dir when saving a file
repo = 'mopp/autodirmake.vim'

# }}}

# --------------------------------------------------------
# Buffer/Tab {{{
# --------------------------------------------------------

[[plugins]] # open tab instead of buffer
