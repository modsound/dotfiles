[[plugins]] # colorscheme
repo = 'vim-scripts/Wombat'

[[plugins]] # colorscheme
repo = 'morhetz/gruvbox'

# }}}

# --------------------------------------------------------
# Folding {{{
# --------------------------------------------------------

[[plugins]] # customize folding settings
repo = 'LeafCage/foldCC.vim'

# }}}

# --------------------------------------------------------
# Text Object {{{
# --------------------------------------------------------

[[plugins]] # text object plugin depends on
repo = 'kana/vim-operator-user'

[[plugins]] # text objects for indentation
repo = 'tweekmonster/braceless.vim'

# }}}

# --------------------------------------------------------
# Completion {{{
# --------------------------------------------------------

[[plugins]] # keyword completion
repo = 'Shougo/neocomplete.vim'
depends = 'context_filetype.vim'
if = "has('lua')"
on_event = 'InsertEnter'

[[plugins]]
repo = 'Shougo/neosnippet-snippets'
depends = ['neosnippet-snippets', 'context_filetype.vim']
on_event = 'InsertEnter'
on_ft = 'snippet'

[[plugins]]
repo = 'Shougo/context_filetype.vim'

[[plugins]] # dictionaries for neocomplete
repo = 'pocke/dicts'

[[plugins]] # auto add end tag for ruby
repo = 'tpope/vim-endwise'
on_event = 'InsertEnter'

[[plugins]] # english source for neocomplete
repo = 'ujihisa/neco-look'
on_source = 'neocomplete.vim'

[[plugins]] # toggle comment
repo = 'tyru/caw.vim'

[[plugins]] # ruby code completion
repo = 'osyo-manga/vim-monster'
on_ft = 'ruby'

[[plugins]] # automatic closing of quotes, parenthesis, brackets
repo = 'Raimondi/delimitMate'

# }}}

